services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postings
    volumes:
      - postings:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postings"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
  api:
    build: .
    environment:
      POSTINGS_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/postings
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postings: