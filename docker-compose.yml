services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postings
      POSTGRES_PASSWORD: postings
      POSTGRES_DB: postings
    ports:
      - "5432:5432"
    volumes:
      - postings_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postings -d postings"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postings:postings@db:5432/postings
      APP_ENV: docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postings_pgdata: